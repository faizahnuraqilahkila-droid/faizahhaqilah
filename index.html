<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menjelajahi Laut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#1565c0',
                        muda: '#2196f3',
                        terang: '#e3f2fd',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .teks-bayangan {
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            }
            .bayangan-kotak {
                box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            }
            .animasi-gerak {
                animation: gerak 4s ease-in-out infinite alternate;
            }
            @keyframes gerak {
                0% { transform: translateY(0px) rotate(0deg); }
                100% { transform: translateY(-25px) rotate(8deg); }
            }
            .tombol-bergerak {
                position: absolute;
                transition: all 0.2s ease;
            }
            .gelombang {
                background: linear-gradient(90deg, #2196f3, #64b5f6, #bbdefb);
                background-size: 300% 300%;
                animation: gelombang 8s ease infinite;
            }
            @keyframes gelombang {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
        }
    </style>
</head>
<body class="bg-terang min-h-screen font-sans overflow-x-hidden">
    <!-- Latar Belakang Pola Laut -->
    <div class="fixed inset-0 opacity-10 pointer-events-none">
        <i class="fa fa-water text-[150px] text-utama absolute"></i>
        <i class="fa fa-fish text-[100px] text-muda absolute top-20 right-20"></i>
        <i class="fa fa-ship text-[80px] text-utama absolute bottom-20 left-1/4"></i>
        <i class="fa fa-tint text-[120px] text-muda absolute top-1/3 right-1/3"></i>
        <i class="fa fa-anchor text-[90px] text-utama absolute bottom-10 right-10"></i>
    </div>

    <!-- Konten Utama -->
    <div class="container mx-auto px-4 py-16 relative z-10">
        <header class="text-center mb-16">
            <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-bold text-utama teks-bayangan">
                <i class="fa fa-water mr-3"></i>Menjelajahi Laut<i class="fa fa-fish ml-3"></i>
            </h1>
            <p class="text-[clamp(1.1rem,3vw,1.3rem)] text-gray-700 max-w-2xl mx-auto mt-4">
                Rasakan segarnya angin laut, lihat hamparan biru yang luas, dan temukan keajaiban tersembunyi di dalamnya. Apakah kamu siap berpetualang?
            </p>
        </header>

        <!-- Kotak Pertanyaan & Tombol -->
        <div class="max-w-xl mx-auto bg-white rounded-3xl bayangan-kotak p-8 md:p-10 border-4 border-muda/30 relative min-h-[300px]">
            <div id="pertanyaan" class="text-center mb-10">
                <h2 class="text-[clamp(1.5rem,4vw,2rem)] font-semibold text-gray-800 mb-6">
                    Apakah kamu siap menjelajahi keindahan laut?
                </h2>
            </div>

            <!-- Tempat Tombol -->
            <div id="wadahTombol" class="flex flex-wrap justify-center gap-6 relative min-h-[100px]">
                <button id="btnIya" class="bg-muda hover:bg-utama text-white font-bold py-3 px-10 rounded-full text-lg transition-all duration-300 transform hover:scale-105 hover:shadow-lg focus:outline-none gelombang">
                    <i class="fa fa-check mr-2"></i> IYA
                </button>
                <button id="btnTidak" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-10 rounded-full text-lg transition-all duration-300 focus:outline-none">
                    <i class="fa fa-times mr-2"></i> TIDAK
                </button>
            </div>

            <!-- Tempat Pesan -->
            <div id="pesan" class="mt-10 text-center hidden">
                <div class="p-6 bg-terang rounded-xl border-2 border-muda/40">
                    <i class="fa fa-water text-utama text-5xl mb-4"></i>
                    <p id="teksPesan" class="text-xl text-gray-800 font-medium"></p>
                </div>
            </div>
        </div>

        <!-- Stiker Bergerak Tema Laut -->
        <div class="mt-20 relative h-[250px]">
            <div class="animasi-gerak absolute top-0 left-[10%] text-utama text-7xl">
                <i class="fa fa-fish"></i>
            </div>
            <div class="animasi-gerak absolute top-[30%] left-[25%] text-muda text-5xl" style="animation-delay: 1s">
                <i class="fa fa-water"></i>
            </div>
            <div class="animasi-gerak absolute top-[10%] left-[60%] text-utama text-6xl" style="animation-delay: 2s">
                <i class="fa fa-ship"></i>
            </div>
            <div class="animasi-gerak absolute top-[40%] left-[80%] text-muda text-5xl" style="animation-delay: 1.5s">
                <i class="fa fa-anchor"></i>
            </div>
            <div class="animasi-gerak absolute top-[50%] left-[45%] text-utama text-6xl" style="animation-delay: 0.5s">
                <i class="fa fa-tint"></i>
            </div>
            <div class="animasi-gerak absolute top-[20%] left-[35%] text-muda text-5xl" style="animation-delay: 2.5s">
                <i class="fa fa-turtle"></i>
            </div>
        </div>
    </div>

    <script>
        // Ambil elemen
        const btnIya = document.getElementById('btnIya');
        const btnTidak = document.getElementById('btnTidak');
        const pesan = document.getElementById('pesan');
        const teksPesan = document.getElementById('teksPesan');
        const wadahTombol = document.getElementById('wadahTombol');
        let tombolBergerak = false;

        // Daftar pesan positif tema laut
        const daftarPesan = [
            "Hebat! Selamat berpetualang di laut. Rasakan segarnya angin laut, lihat hamparan biru yang luas, dan nikmati setiap keindahan yang ada di dalamnya 🌊🐠",
            "Pilihan yang tepat! Laut menyimpan jutaan keajaiban, dari terumbu karang yang berwarna-warni hingga berbagai jenis ikan yang cantik. Di sini kamu bisa menemukan kedamaian dan keindahan alam yang luar biasa 🐢✨",
            "Siap berpetualang? Ayo jelajahi dasar laut yang menakjubkan, dengarkan suara ombak yang menenangkan, dan rasakan keagungan ciptaan Tuhan yang tiada duanya 🌊⛵",
            "Bagus! Menjelajahi laut membuat kita lebih mencintai alam, menyadari pentingnya menjaga kelestariannya, dan belajar banyak hal tentang kehidupan di dalam air 🐬💙",
            "Ayo pergi! Laut adalah rumah bagi ribuan makhluk hidup, tempat yang menyimpan banyak misteri dan keindahan yang siap kamu temukan. Selamat menikmati perjalananmu 🌊🐳🐚",
            "Tepat sekali! Di tengah luasnya laut, kamu bisa merasakan kebebasan, ketenangan, dan keagungan alam yang akan membuatmu takjub seumur hidup 🚤💙"
        ];

        // Fungsi untuk memindahkan tombol Tidak secara acak
        function pindahTombolTidak() {
            if (!tombolBergerak) return;

            const lebarWadah = wadahTombol.offsetWidth;
            const tinggiWadah = wadahTombol.offsetHeight;
            const lebarTombol = btnTidak.offsetWidth;
            const tinggiTombol = btnTidak.offsetHeight;

            // Posisi acak agar tidak keluar dari wadah
            const posX = Math.floor(Math.random() * (lebarWadah - lebarTombol));
            const posY = Math.floor(Math.random() * (tinggiWadah - tinggiTombol));

            btnTidak.style.left = `${posX}px`;
            btnTidak.style.top = `${posY}px`;
        }

        // Klik tombol IYA
        btnIya.addEventListener('click', function() {
            tombolBergerak = false;
            btnTidak.classList.remove('tombol-bergerak');
            btnTidak.style.position = '';
            btnTidak.style.left = '';
            btnTidak.style.top = '';
            
            // Tampilkan pesan acak
            const pesanAcak = daftarPesan[Math.floor(Math.random() * daftarPesan.length)];
            teksPesan.textContent = pesanAcak;
            pesan.classList.remove('hidden');

            // Sembunyikan tombol setelah beberapa saat
            setTimeout(() => {
                wadahTombol.classList.add('hidden');
            }, 800);
        });

        // Klik tombol TIDAK
        btnTidak.addEventListener('click', function(e) {
            e.preventDefault();
            if (!tombolBergerak) {
                tombolBergerak = true;
                btnTidak.classList.add('tombol-bergerak');
                pindahTombolTidak();
                // Pindah setiap 200ms
                setInterval(pindahTombolTidak, 200);
            }
            pindahTombolTidak();
        });
    </script>
</body>
</html>
